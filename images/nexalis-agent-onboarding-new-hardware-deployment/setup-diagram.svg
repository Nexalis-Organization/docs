<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0f172a"/>
    </marker>
    <style>
      .box   { fill:#ffffff; stroke:#0f172a; stroke-width:2.5; }
      .title { fill:#0f172a; font-weight:700; }
      .sub   { fill:#334155; font-size:16px; }
      .lbl   { fill:#0f172a; font-size:18px; font-weight:700; }
      .lblbg { fill:#eef2f7; stroke:#94a3b8; stroke-width:1.5; }
      .link  { stroke:#0f172a; stroke-width:3; fill:none; }
      .green { fill:#1f6b3e; font-size:16px; font-weight:700; }
    </style>
  </defs>

  <!-- Light background so the diagram is readable on any theme -->
  <rect x="0" y="0" width="1040" height="560" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Heading -->
  <text x="40" y="50" class="title" font-size="27">Onboarding setup — physical connections</text>
  <text x="40" y="80" class="sub" font-size="16.5">How the Nexalis Flash app, the onboarding device and the target hardware are connected during flashing.</text>

  <!-- 1. Target hardware (Compulab) -->
  <rect x="40" y="158" width="240" height="150" rx="14" class="box"/>
  <rect x="78" y="194" width="164" height="80" rx="8" fill="#0f3d24"/>
  <rect x="92" y="208" width="40" height="40" rx="4" fill="#1f6b3e"/>
  <rect x="150" y="208" width="80" height="14" rx="3" fill="#2e7d46"/>
  <rect x="150" y="230" width="60" height="10" rx="3" fill="#2e7d46"/>
  <rect x="150" y="248" width="74" height="10" rx="3" fill="#2e7d46"/>
  <text x="160" y="298" class="lbl" text-anchor="middle">Target hardware</text>
  <text x="160" y="144" class="sub" text-anchor="middle">in its enclosure</text>
  <text x="160" y="332" class="sub" text-anchor="middle">Compulab IOTG-IMX8PLUS</text>

  <!-- micro-USB link -->
  <line x1="282" y1="233" x2="392" y2="233" class="link" marker-end="url(#arrow)"/>
  <rect x="283" y="182" width="108" height="30" rx="8" class="lblbg"/>
  <text x="337" y="203" class="lbl" text-anchor="middle" font-size="16">micro-USB</text>

  <!-- 2. Onboarding device (Raspberry Pi) -->
  <rect x="400" y="158" width="240" height="150" rx="14" class="box"/>
  <rect x="438" y="192" width="164" height="84" rx="8" fill="#1f1f1f"/>
  <circle cx="455" cy="208" r="5" fill="#3a3a3a"/>
  <circle cx="585" cy="208" r="5" fill="#3a3a3a"/>
  <rect x="448" y="240" width="26" height="20" rx="2" fill="#9aa0a6"/>
  <rect x="480" y="240" width="26" height="20" rx="2" fill="#1f78ff"/>
  <rect x="512" y="240" width="26" height="20" rx="2" fill="#cfd3d8"/>
  <text x="520" y="298" class="lbl" text-anchor="middle">Onboarding device</text>
  <text x="520" y="144" class="sub" text-anchor="middle">runs Nexalis Flash</text>
  <text x="520" y="332" class="sub" text-anchor="middle">Raspberry Pi (provided)</text>

  <!-- Bluetooth link (two-way) -->
  <line x1="642" y1="233" x2="752" y2="233" class="link" marker-end="url(#arrow)"/>
  <line x1="752" y1="233" x2="642" y2="233" class="link" marker-end="url(#arrow)"/>
  <rect x="648" y="182" width="98" height="30" rx="8" class="lblbg"/>
  <text x="697" y="203" class="lbl" text-anchor="middle" font-size="16">Bluetooth</text>

  <!-- 3. Phone -->
  <rect x="760" y="158" width="240" height="150" rx="14" class="box"/>
  <rect x="848" y="180" width="64" height="106" rx="10" fill="#0f172a"/>
  <rect x="854" y="190" width="52" height="80" rx="3" fill="#eef6f0"/>
  <circle cx="880" cy="279" r="4" fill="#475569"/>
  <text x="880" y="298" class="lbl" text-anchor="middle">Smartphone</text>
  <text x="880" y="144" class="sub" text-anchor="middle">iPhone or Android</text>
  <text x="880" y="332" class="sub" text-anchor="middle">Nexalis Flash app</text>

  <!-- After flashing arrow down -->
  <line x1="160" y1="332" x2="160" y2="410" class="link" marker-end="url(#arrow)"/>
  <rect x="52" y="350" width="216" height="30" rx="8" class="lblbg"/>
  <text x="160" y="371" class="green" text-anchor="middle">After flash + power cycle</text>

  <!-- 4. Cloud -->
  <rect x="40" y="418" width="588" height="118" rx="14" class="box"/>
  <g transform="translate(60,452)">
    <path d="M18 50 a17 17 0 0 1 3 -34 a24 24 0 0 1 45 5 a16 16 0 0 1 -3 32 z" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2.5"/>
  </g>
  <text x="146" y="460" class="lbl" font-size="16">Device boots the Nexalis Agent image</text>
  <text x="146" y="488" class="sub" font-size="14.5">Connects over the site network to Nexalis Edge Manager</text>
  <text x="146" y="512" class="sub" font-size="14.5">and streams data to Nexalis Cloud — no inbound ports required.</text>

  <!-- Legend note -->
  <text x="664" y="450" class="sub" font-size="14.5">The onboarding device only flashes the</text>
  <text x="664" y="474" class="sub" font-size="14.5">OS image onto the target. Once flashing</text>
  <text x="664" y="498" class="sub" font-size="14.5">succeeds and the target is power-cycled,</text>
  <text x="664" y="522" class="sub" font-size="14.5">the onboarding device and phone are no</text>
  <text x="664" y="546" class="sub" font-size="14.5">longer needed.</text>
</svg>
